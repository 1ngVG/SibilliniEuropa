<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sibillini Europa Widgets</title>
    <meta name="description" content="Anteprima pubblicata dei widget standalone per Sibillini Europa.">
    <link rel="stylesheet" href="/gallery-widget.css">
    <link rel="stylesheet" href="/schedule-widget.css">
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, "Times New Roman", serif;
        background: #f4f0e8;
        color: #1f2937;
      }

      body {
        margin: 0;
        min-block-size: 100vh;
        background:
          radial-gradient(circle at top left, rgba(191, 219, 254, 0.45), transparent 35%),
          linear-gradient(180deg, #f8f5ef 0%, #f0ece3 100%);
      }

      main {
        max-inline-size: 1100px;
        margin: 0 auto;
        padding: 4rem 1.5rem 6rem;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.2rem, 5vw, 4rem);
      }

      p {
        max-inline-size: 66ch;
        line-height: 1.7;
      }

      code {
        padding: 0.12rem 0.4rem;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sibillini Europa Gallery Widget</h1>
      <p>
        Questa pagina conferma che il deploy Netlify e attivo e che i widget possono essere caricati correttamente.
        Galleria corrente: <code>Sess25</code>. Programma corrente: <code>program</code>.
      </p>
      <div class="gallery-widget" data-gallery="Sess25"></div>
      <div style="margin-top: 2rem;">
        <div class="schedule-widget" data-schedule="program"></div>
      </div>
    </main>
    <script defer src="/gallery-widget.js"></script>
    <script defer src="/schedule-widget.js"></script>
  </body>
</html>
